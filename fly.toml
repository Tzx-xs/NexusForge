# Fly.io 配置 — NexusForge（星枢）后端
app = "nexusforge"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  DATABASE_URL = "sqlite:////data/nexusforge.db"
  CORS_ORIGINS = "https://nexusforge.pages.dev"

[[mounts]]
  source = "nexusforge_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "3s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
