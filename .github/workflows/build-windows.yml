name: Build Windows Desktop App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── 后端：安装依赖 + PyInstaller 打包 ───
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-nsis.txt
          pip install pyinstaller

      - name: Build backend with PyInstaller
        working-directory: backend
        run: pyinstaller --distpath ../out --workpath ../out/build --noconfirm nexusforge-backend.spec

      # ─── 前端：安装依赖 + Vite 构建 ───
      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
        env:
          VITE_BASE_URL: /

      # ─── 组装便携版包 ───
      - name: Assemble release package
        shell: pwsh
        run: |
          $pkg = "out/nexusforge-backend"
          # 把前端 dist 放到后端 exe 同级的 frontend/dist
          New-Item -ItemType Directory -Force -Path "$pkg/frontend" | Out-Null
          Copy-Item -Recurse -Force dist "$pkg/frontend/dist"
          # 启动脚本
          @'
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          echo Starting NexusForge...
          start "" "nexusforge-backend.exe" 8005
          timeout /t 3 >nul
          start "" http://127.0.0.1:8005/
          '@ | Set-Content -Encoding UTF8 "$pkg/start.bat"
          # 说明文件
          @'
          NexusForge 星枢 - Windows 便携版
          ==================================

          使用方法：
          1. 双击 start.bat 启动
          2. 浏览器自动打开 http://127.0.0.1:8005
          3. 首次使用需在「设置」中配置 LLM API Key
          4. 关闭命令行窗口或 Ctrl+C 停止

          数据存储在当前目录下 data/ 文件夹。
          '@ | Set-Content -Encoding UTF8 "$pkg/README.txt"
          Write-Host "Package assembled at $pkg"

      # ─── 上传 Artifact ───
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusForge-windows-portable
          path: out/nexusforge-backend/
          if-no-files-found: error

      # ─── 打 tag 时创建 Release ───
      - name: Zip release package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Compress-Archive -Path out/nexusforge-backend/* -DestinationPath out/NexusForge-windows-portable.zip

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/NexusForge-windows-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
