name: Build Windows Desktop App

# NexusForge Windows 桌面应用打包
# 触发条件：推送 tag v* 或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      # ─── 1. 安装 Python 3.14 ─────────────────────────────────
      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      # ─── 2. 安装后端依赖 + PyInstaller ───────────────────────
      # 关键：使用 requirements-nsis.txt（精简版），排除 chromadb / sentence-transformers / faiss-cpu
      # 等重型 ML 栈。否则 PyTorch 会让冻结包 > 2GiB，触发 NSIS "Internal compiler error #12345"
      # 代码已有 fallback：SimpleVectorStore / OpenAIEmbeddingService / SimpleHashEmbedding
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-nsis.txt
          pip install pyinstaller

      # ─── 3. 安装前端依赖 ─────────────────────────────────────
      # 用 npm install 而非 npm ci：因为 package.json 把 @tauri-apps/api 升级到 ^2.11
      # 以匹配 Rust crate tauri 2.11.x，package-lock.json 需要更新
      - name: Install frontend dependencies
        run: npm install --no-fund --no-audit

      # ─── 4. 前端构建 ─────────────────────────────────────────
      - name: Build frontend
        run: npm run build
        env:
          VITE_ENABLE_TIPTAP_EDITOR: 'true'

      # ─── 5. PyInstaller 打包后端 ─────────────────────────────
      # 修复：--add-data 路径相对于 --specpath 解析，而非 working-directory
      # 因此用 $GITHUB_WORKSPACE 构造绝对路径，避免 "Unable to find ... config" 错误
      - name: Package backend with PyInstaller
        working-directory: backend
        run: |
          $BE = "$env:GITHUB_WORKSPACE\backend"
          python -m PyInstaller `
            --name nexusforge-backend `
            --onedir `
            --distpath ../out/tauri `
            --workpath ../out/tauri/build `
            --specpath ../out/tauri `
            --add-data "$BE\config;config" `
            --add-data "$BE\migrations;migrations" `
            --add-data "$BE\infrastructure\ai\prompt_packages;infrastructure/ai/prompt_packages" `
            --add-data "$BE\infrastructure\persistence\schema.sql;infrastructure/persistence" `
            --add-data "$BE\alembic.ini;." `
            --add-data "$BE\alembic;alembic" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import sqlalchemy.dialects.sqlite `
            --hidden-import apscheduler.schedulers.asyncio `
            --collect-submodules interfaces `
            --collect-submodules application `
            --collect-submodules domain `
            --collect-submodules infrastructure `
            --collect-submodules engine `
            --collect-submodules agents `
            --collect-submodules config `
            --noconfirm `
            backend_entry.py

      # ─── 6. Tauri 打包桌面应用 ───────────────────────────────
      - name: Build Tauri app
        run: npx tauri build --bundles nsis
        env:
          VITE_ENABLE_TIPTAP_EDITOR: 'true'

      # ─── 7. 上传产物 ─────────────────────────────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: NexusForge-windows-installer
          path: frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: NexusForge-windows-exe
          path: frontend/src-tauri/target/release/nexusforge.exe
          if-no-files-found: error

      # ─── 8. Release 发布（仅 tag 触发时）─────────────────────
      # 移除 generate_release_notes: true 避免 PAT 权限不足导致 403 错误
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          draft: true
