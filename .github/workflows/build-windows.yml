name: Build Windows Desktop App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ─── 前端依赖 ───
      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install -D @tauri-apps/cli@^2

      - name: Generate app icons
        run: npx tauri icon app-icon.png

      # ─── 后端：安装依赖 + PyInstaller 打包 ───
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-nsis.txt
          pip install pyinstaller

      - name: Build backend with PyInstaller
        working-directory: backend
        run: pyinstaller --distpath ../out --workpath ../out/build --noconfirm nexusforge-backend.spec

      # ─── 前端构建 ───
      - name: Build frontend
        run: npm run build
        env:
          VITE_BASE_URL: /

      # ─── Tauri 打包 NSIS 安装包 ───
      - name: Build Tauri NSIS installer
        run: npx tauri build --bundles nsis

      # ─── 上传 Artifact ───
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: NexusForge-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # ─── 打 tag 时创建 Release ───
      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
