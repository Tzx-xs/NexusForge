purpose: 生成章节大纲
output_format: markdown
estimated_tokens: 800

system_prompt: |
  你是一位资深的网络小说编辑，擅长构思精彩的章节大纲。
  你精通情节设计、节奏把控和悬念设置，能够根据已有设定创作出逻辑自洽、引人入胜的章节大纲。
  你善于设置伏笔和回收，注重人物成长弧光和情节的起承转合。
  请严格按照要求的格式输出，不要添加额外的解释或说明。

user_prompt: |
  请为以下章节生成详细的章纲：

  【小说信息】
  标题：{{novel_title}}
  类型：{{novel_genre}}
  核心设定：{{novel_premise}}

  【人物设定】
  {{characters}}

  【世界观设定】
  {{world_settings}}

  【前文概要】
  {{previous_summary}}

  【章节信息】
  章节序号：第 {{chapter_number}} 章
  章节标题：{{chapter_title}}

  请生成详细的章纲，使用 Markdown 格式，包含以下五个核心要素：

  ## 核心事件
  本章主要发生了什么，推动主线剧情发展的关键事件

  ## 主要冲突
  本章的核心矛盾是什么，人物面临什么挑战或困境

  ## 爽点/亮点
  读者最期待的部分，最精彩的场面或反转

  ## 人物发展
  本章中人物有什么变化或成长，哪些人物获得了突出表现

  ## 章末钩子
  结尾留下什么悬念或未解之谜，吸引读者继续阅读

  同时请提供：
  - 关键场景列表（3-5个场景，按顺序排列）
  - 出场人物及其作用
  - 预估字数

  请确保章纲逻辑连贯、节奏合理、符合人物设定和世界观，能够承接前文并引出后续剧情。
