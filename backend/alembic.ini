# Alembic migration config for Xingyuanbi
# Uses native sqlite3 data access layer; Alembic only manages DDL migrations

[alembic]
# Migration script directory
script_location = alembic

# Migration version file directory (points to backend/migrations/)
version_locations = migrations

# Database URL (SQLite; overwritten by env.py at runtime)
sqlalchemy.url = sqlite:///data/xingyuanbi.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
